services:
  polybot:
    image: ghcr.io/angelacedo/polymarket-no-bot:latest
    container_name: polymarket-no-bot
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - polybot-data:/app/data
    environment:
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.polybot.rule=Host(`polybot.stackmint.cloud`)"
      - "traefik.http.routers.polybot.entrypoints=websecure"
      - "traefik.http.routers.polybot.tls.certresolver=letsencrypt"
      - "traefik.http.routers.polybot.service=polybot-svc"
      - "traefik.http.services.polybot-svc.loadbalancer.server.port=8080"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true

volumes:
  polybot-data:
