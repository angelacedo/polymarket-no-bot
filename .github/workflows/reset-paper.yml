name: Reset paper trading data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm deletion of ALL trade history'
        required: true

jobs:
  reset:
    if: ${{ github.event.inputs.confirm == 'reset' }}
    runs-on: ubuntu-latest
    steps:
      - name: Reset via admin API (preferred)
        run: |
          set -euo pipefail
          TOKEN="${{ secrets.ADMIN_RESET_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            TOKEN="polybot-reset-secret"
          fi
          RESP=$(curl -fsS -X POST \
            -H "X-Admin-Token: ${TOKEN}" \
            "https://polybot.stackmint.cloud/api/admin/reset")
          echo "$RESP"

      - name: Fallback — SSH wipe if API not yet deployed
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            docker stop polymarket-no-bot || true
            docker run --rm -v polybot-data:/data alpine sh -c "
              apk add --no-cache sqlite >/dev/null 2>&1
              sqlite3 /data/bot.db 'DELETE FROM trades; DELETE FROM orders; DELETE FROM equity_curve; DELETE FROM positions_snapshot; VACUUM;'
            "
            docker compose -f /root/polymarket-no-bot/docker-compose.yml up -d
