name: Reset paper trading data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm deletion of all paper trading history'
        required: true

jobs:
  reset:
    if: ${{ github.event.inputs.confirm == 'reset' }}
    runs-on: ubuntu-latest
    steps:
      - name: Clear paper trading tables on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Stopping container..."
            docker stop polymarket-no-bot || true

            echo "Clearing paper trading tables..."
            docker run --rm \
              -v polybot-data:/data \
              alpine sh -c "
                apk add --no-cache sqlite >/dev/null 2>&1
                sqlite3 /data/bot.db '
                  DELETE FROM trades WHERE mode=\"paper\";
                  DELETE FROM orders WHERE mode=\"paper\";
                  DELETE FROM equity_curve WHERE mode=\"paper\";
                  DELETE FROM positions_snapshot WHERE mode=\"paper\";
                  VACUUM;
                '
                echo \"Tables cleared. Row counts:\"
                sqlite3 /data/bot.db 'SELECT \"trades:\", COUNT(*) FROM trades WHERE mode=\"paper\";'
                sqlite3 /data/bot.db 'SELECT \"orders:\", COUNT(*) FROM orders WHERE mode=\"paper\";'
                sqlite3 /data/bot.db 'SELECT \"equity_curve:\", COUNT(*) FROM equity_curve WHERE mode=\"paper\";'
              "

            echo "Restarting container with latest image..."
            docker compose -f /root/polymarket-no-bot/docker-compose.yml pull
            docker compose -f /root/polymarket-no-bot/docker-compose.yml up -d

            echo "Done. Paper trading reset complete."
