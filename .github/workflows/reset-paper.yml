name: Reset paper trading data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "reset" to confirm deletion of ALL trade history'
        required: true

jobs:
  reset:
    if: ${{ github.event.inputs.confirm == 'reset' }}
    runs-on: ubuntu-latest
    steps:
      - name: Clear all trading history on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "Stopping container..."
            docker stop polymarket-no-bot || true

            echo "Wiping all trade history..."
            docker run --rm \
              -v polybot-data:/data \
              alpine sh -c "
                apk add --no-cache sqlite >/dev/null 2>&1
                sqlite3 /data/bot.db '
                  DELETE FROM trades;
                  DELETE FROM orders;
                  DELETE FROM equity_curve;
                  DELETE FROM positions_snapshot;
                  VACUUM;
                '
                echo \"Remaining rows:\"
                sqlite3 /data/bot.db 'SELECT \"trades:\", COUNT(*) FROM trades;'
                sqlite3 /data/bot.db 'SELECT \"orders:\", COUNT(*) FROM orders;'
                sqlite3 /data/bot.db 'SELECT \"equity_curve:\", COUNT(*) FROM equity_curve;'
                sqlite3 /data/bot.db 'SELECT \"positions_snapshot:\", COUNT(*) FROM positions_snapshot;'
              "

            echo "Restarting container with latest image..."
            docker compose -f /root/polymarket-no-bot/docker-compose.yml pull
            docker compose -f /root/polymarket-no-bot/docker-compose.yml up -d

            echo "Done. All trade history cleared; bot restarted with fresh paper state."
