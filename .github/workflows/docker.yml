name: Build and push Docker image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/angelacedo/polymarket-no-bot:latest
            ghcr.io/angelacedo/polymarket-no-bot:${{ github.sha }}

      - name: Publish GHCR package (pullable without auth)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const pkgs = await github.rest.packages.listPackagesForAuthenticatedUser({
              package_type: 'container',
              per_page: 100,
            });
            const pkg = pkgs.data.find((p) => p.name === 'polymarket-no-bot')
              ?? pkgs.data.find((p) => p.name.includes('polymarket'));
            if (!pkg) {
              core.setFailed('GHCR package polymarket-no-bot not found');
              return;
            }
            core.info(`Publishing package ${pkg.name} as public`);
            await github.rest.packages.setPackageVisibilityForAuthenticatedUser({
              package_type: 'container',
              package_name: pkg.name,
              visibility: 'public',
            });
