name: Build and deploy (private repo → private GHCR → VPS)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/angelacedo/polymarket-no-bot:latest
            ghcr.io/angelacedo/polymarket-no-bot:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      VPS_VM_ID: ${{ vars.VPS_VM_ID }}
      VPS_PROJECT: polymarket-no-bot
    steps:
      - name: Authenticate Docker on VPS for private GHCR
        id: vps_login
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Pull new image and recreate containers (Hostinger API)
        run: |
          set -euo pipefail
          : "${HOSTINGER_API_TOKEN:?Set HOSTINGER_API_TOKEN repository secret}"
          : "${VPS_VM_ID:?Set VPS_VM_ID repository variable (e.g. 1718150)}"
          curl -fsS -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${VPS_VM_ID}/docker/${VPS_PROJECT}/update" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Accept: application/json"
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}

      - name: Warn if GHCR login failed (private image pull may fail)
        if: steps.vps_login.outcome == 'failure'
        run: |
          echo "::warning::Could not SSH to VPS for docker login. If GHCR is private, either fix SSH secrets or make the GHCR package public (repo stays private)."
