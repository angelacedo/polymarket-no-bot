# Docker deployment config — paper mode, metrics exposed on all interfaces

[execution]
mode = "paper"
baseline_latency_ms = 50
latency_jitter_ms = 30
# Hold NO positions to resolution; only cut if price collapses > 95%.
stop_loss_price = 0.05
take_profit_price = 0.99

[metrics]
bind_addr = "0.0.0.0:8080"

[storage]
database_path = "/app/data/bot.db"

[risk]
total_capital = 1000.0
max_invested_capital_fraction = 0.70
max_daily_loss_fraction = 0.05
max_drawdown_fraction = 0.15
max_risk_per_trade_fraction = 0.02
max_notional_per_market = 50.0
allowed_price_range_no = [0.75, 0.99]
# SHORT-DURATION TEST: trade only events resolving within 1 day so paper
# settlement can be verified quickly. min=0 allows imminent (hourly/minute)
# markets; max bounds out the long-dated ones.
min_time_to_expiry_days = 0
max_time_to_expiry_days = 1.0
max_category_risk_fraction = 0.25
max_asset_risk_fraction = 0.15

[strategy]
scan_interval_secs = 30
min_liquidity_usd = 400.0
slippage_band = 0.02
prefer_no_momentum = true
momentum_window_secs = 3600

[copytrade]
poll_interval_ms = 1500

